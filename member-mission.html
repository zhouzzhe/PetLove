<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工作清單</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      .table {
        border: none;
        background-color: #fff5e6;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px; /* 表格之間的距離 */
      }
      .table th,
      .table td {
        border: none;
        text-align: center; /* 改成置中對齊 */
      }
      .table th {
        background-color: #ffcb48;
        color: #fff;
      }
      .chat-icon {
        font-size: 1.5rem;
      }
      div > .star-icon {
        font-size: 1.5rem;
        vertical-align: top; /* 將星星垂直對齊到頂部 */
      }
      div > .btn {
        background-color: #ff6144;
        margin-top: 10px;
      }
      div > .btn:hover {
        background-color: #ff6144;
        border: 1px solid #a52a2a;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <!-- 置入navbar -->
    <div id="navbar"></div>
    <script>
      fetch("navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
    </script>
    <!-- 置入sidebar -->
    <div class="wrapper row">
      <nav class="col-md-2" aria-label="Left Sidebar">
        <div class="userInfo">
          <img src="./img/大頭照.png" alt="載入失敗" class="circle-image" />
          <span>愛遛狗的小姐姐</span>
        </div>
        <div class="aside-list">
          <a href="./member-history.html">
            <span>商品訂單記錄</span>
          </a>
          <a href="./member-Request.html">
            <span>我的請求</span>
          </a>
          <a href="./member-mission.html">
            <span>工作清單</span>
          </a>
          <a href="./member-adoption.html">
            <span>貓狗領養管理</span>
          </a>
          <!-- accordion start -->
          <div class="accordion accordion-flush" id="userInformation">
            <div class="accordion-item">
              <h2 class="accordion-header" id="heading">
                <button
                  class="accordion-button"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#collapseInfo"
                  aria-expanded="false"
                  aria-controls="collapseInfo"
                  id="accordion-btn"
                >
                  會員資料
                </button>
              </h2>
              <div
                id="collapseInfo"
                class="accordion-collapse collapse"
                aria-labelledby="heading"
                data-bs-parent="#userInformation"
              >
                <div class="accordion-body">
                  <ul>
                    <li>
                      <a href="./member-userinfo.html" class="btn"
                        >更改會員資料</a
                      >
                    </li>
                    <li>
                      <a href="./member-password.html" class="btn">密碼設定</a>
                    </li>
                    <li>
                      <a href="./member-payment.html" class="btn"
                        >付款方式管理</a
                      >
                    </li>
                    <li>
                      <a href="./member-logistic.html" class="btn"
                        >常用收件地址</a
                      >
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
          <!-- accordion end -->
          <a>
            <span style="color: #a52a2a">登出</span>
          </a>
        </div>
      </nav>
      <main class="col-md-10">
        <div>
          <h5>工作管理</h5>
          <!-- 即將到來工作任務 -->
          <p style="margin-top: 20px">即將到來</p>
          <table class="table">
            <thead>
              <tr>
                <th>日期</th>
                <th>期間</th>
                <th>次數</th>
                <th class="text-center">聯絡飼主</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2024</td>
                <td>13:00</td>
                <td>2</td>
                <td class="text-center">
                  <i class="bi bi-chat-dots chat-icon"></i>
                </td>
              </tr>
            </tbody>
          </table>
          <!-- 已完成工作 -->
          <p style="margin-top: 20px">已完成訂單</p>
          <table class="table">
            <thead>
              <tr>
                <th>日期</th>
                <th>期間</th>
                <th>次數</th>
                <th class="text-center">評價</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2024</td>
                <td>13:00</td>
                <td>2</td>
                <td class="text-center">
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                </td>
              </tr>
            </tbody>
          </table>
          <table class="table">
            <thead>
              <tr>
                <th>日期</th>
                <th>期間</th>
                <th>次數</th>
                <th class="text-center">評價</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2024</td>
                <td>13:00</td>
                <td>2</td>
                <td class="text-center">
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                </td>
              </tr>
            </tbody>
          </table>
          <!-- 已完成3 -->
          <table class="table">
            <thead>
              <tr>
                <th>日期</th>
                <th>期間</th>
                <th>次數</th>
                <th class="text-center">評價</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2024</td>
                <td>13:00</td>
                <td>2</td>
                <td class="text-center">
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                  <i class="bi bi-star chat-icon"></i>
                </td>
              </tr>
            </tbody>
          </table>
          <!-- 已完成訂單查詢按鈕 -->
          <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <button class="btn" type="button" id="finishedbtn">查詢更多</button>
          </div>
        </div>
      </main>
    </div>
    <!-- 置入footer -->
    <div id="footer"></div>
    <script>
      fetch("Footer.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>
  </body>
</html>
